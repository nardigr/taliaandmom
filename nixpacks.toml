# Coolify / Nixpacks fallback (if Dockerfile is not selected)
# Prefer the Dockerfile in this repo for reproducible builds.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npm run start:prod"
